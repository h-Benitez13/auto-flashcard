# fly.toml app configuration file generated for auto-flashcard-api on 2026-06-23T13:23:31-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'auto-flashcard-api'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_PATH = '/data/app.db'
  PORT = '3001'

[[mounts]]
  source = 'auto_flashcard_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 3001

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
