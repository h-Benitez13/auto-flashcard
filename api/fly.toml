app = 'auto-flashcard-api'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3001'
  DATABASE_PATH = '/data/app.db'

[[services]]
  internal_port = 3001
  protocol = 'tcp'

  [[services.ports]]
    handlers = ['tls', 'http']
    port = 443

  [[services.ports]]
    handlers = ['http']
    port = 80
    force_https = true

[[mounts]]
  source = 'auto_flashcard_data'
  destination = '/data'
